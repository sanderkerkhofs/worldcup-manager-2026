services:
  postgres:
    image: postgres:16-alpine
    container_name: tournament_manager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tournament
      POSTGRES_PASSWORD: tournament
      POSTGRES_DB: tournament_manager
    ports:
      - "5432:5432"
    volumes:
      - tournament_manager_pgdata:/var/lib/postgresql/data

volumes:
  tournament_manager_pgdata: